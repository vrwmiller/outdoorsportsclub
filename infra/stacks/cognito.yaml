AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  Cognito User Pool for Outdoor Sports Club member authentication.
  Supports email/password (COGNITO) and social login via Google and Facebook.
  One User Pool per environment — the dev pool never contains real member data.
  No kiosk app client is provisioned here; kiosk authentication is handled
  exclusively through the Device Token mechanism in the Lambda layer.

Parameters:
  Environment:
    Type: String
    AllowedValues: [dev, prod]
    Description: Deployment environment (dev or prod).

  SocialLoginEnabled:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "false"
    Description: >-
      Set to true to enable Google and Facebook social login.
      Requires GoogleClientId, GoogleClientSecret, FacebookAppId, and
      FacebookAppSecret to be supplied. Leave false for dev environments
      that do not yet have OAuth apps configured.

  GoogleClientId:
    Type: String
    Default: ""
    Description: >-
      Google OAuth 2.0 client ID from the Google Cloud Console.
      This value appears in browser URLs and is not secret, but it must
      match the client ID registered for this environment's callback URL.
      Required when SocialLoginEnabled is true.

  GoogleClientSecret:
    Type: String
    Default: ""
    NoEcho: true
    Description: >-
      Google OAuth 2.0 client secret from the Google Cloud Console.
      Treat as a secret — do not log or commit this value.
      Required when SocialLoginEnabled is true.

  FacebookAppId:
    Type: String
    Default: ""
    Description: >-
      Facebook app ID from Meta for Developers.
      This value is not secret, but it must match the app configured
      for this environment's OAuth redirect URI.
      Required when SocialLoginEnabled is true.

  FacebookAppSecret:
    Type: String
    Default: ""
    NoEcho: true
    Description: >-
      Facebook app secret from Meta for Developers.
      Treat as a secret — do not log or commit this value.
      Required when SocialLoginEnabled is true.

  CallbackUrl:
    Type: CommaDelimitedList
    Description: >-
      One or more OAuth callback URLs (comma-separated) registered with Google and Facebook.
      prod:  https://outdoorsportsclub.com/auth/callback
      dev:   http://localhost:3000/auth/callback,https://main.d2rljf3gefhatr.amplifyapp.com/auth/callback

  LogoutUrl:
    Type: CommaDelimitedList
    Description: >-
      One or more post-logout redirect URLs (comma-separated).
      prod:  https://outdoorsportsclub.com
      dev:   http://localhost:3000,https://main.d2rljf3gefhatr.amplifyapp.com

  UserPoolDomainPrefix:
    Type: String
    MinLength: 1
    Description: >-
      Globally unique prefix for the Cognito hosted UI domain.
      Must be unique across all AWS accounts worldwide.
      Convention: osc-members-<env>-<short-account-suffix>
      Example:    osc-members-prod-a1b2c3

Rules:
  SocialLoginParamsRequired:
    RuleCondition: !Equals [!Ref SocialLoginEnabled, "true"]
    Assertions:
      - Assert: !Not [!Equals [!Ref GoogleClientId, ""]]
        AssertDescription: "GoogleClientId is required when SocialLoginEnabled is true"
      - Assert: !Not [!Equals [!Ref GoogleClientSecret, ""]]
        AssertDescription: "GoogleClientSecret is required when SocialLoginEnabled is true"
      - Assert: !Not [!Equals [!Ref FacebookAppId, ""]]
        AssertDescription: "FacebookAppId is required when SocialLoginEnabled is true"
      - Assert: !Not [!Equals [!Ref FacebookAppSecret, ""]]
        AssertDescription: "FacebookAppSecret is required when SocialLoginEnabled is true"

Conditions:
  # Social identity providers are optional. Set SocialLoginEnabled=true
  # once Google and Facebook OAuth apps are configured for the environment.
  IsSocialLoginEnabled: !Equals [!Ref SocialLoginEnabled, "true"]

Resources:

  # ---------------------------------------------------------------------------
  # User Pool
  # ---------------------------------------------------------------------------
  UserPool:
    Type: AWS::Cognito::UserPool
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      UserPoolName: !Sub "osc-users-${Environment}"

      # Members log in with their email address.
      UsernameAttributes:
        - email

      # Email is auto-verified via the Cognito confirmation code flow.
      AutoVerifiedAttributes:
        - email

      Schema:
        - Name: email
          Required: true
          Mutable: true
        - Name: name
          Required: false
          Mutable: true

      Policies:
        PasswordPolicy:
          MinimumLength: 12
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
          TemporaryPasswordValidityDays: 7

      # Email is the sole recovery channel — no SMS-based account recovery
      # so that member phone numbers are not required for password reset.
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1

      AdminCreateUserConfig:
        # Allow self-registration through the Member Portal.
        AllowAdminCreateUserOnly: false

      # Hides whether an account exists on sign-in failure, reducing enumeration
      # risk against the member roster.
      UserPoolAddOns:
        AdvancedSecurityMode: AUDIT

      UserPoolTags:
        Project: outdoor-sports-club
        Environment: !Ref Environment
        ManagedBy: cloudformation

  # ---------------------------------------------------------------------------
  # Social Identity Providers (optional — only created when SocialLoginEnabled=true)
  # ---------------------------------------------------------------------------
  GoogleIdentityProvider:
    Type: AWS::Cognito::UserPoolIdentityProvider
    Condition: IsSocialLoginEnabled
    Properties:
      UserPoolId: !Ref UserPool
      ProviderName: Google
      ProviderType: Google
      ProviderDetails:
        client_id: !Ref GoogleClientId
        client_secret: !Ref GoogleClientSecret
        authorize_scopes: "profile email openid"
      AttributeMapping:
        # Map the Google email claim to the Cognito email attribute so that
        # social-login members share the same identity key as password-login
        # members. The sub claim from Cognito (not from Google) is the
        # durable identity key stored as members.cognito_sub in Aurora.
        email: email
        name: name

  FacebookIdentityProvider:
    Type: AWS::Cognito::UserPoolIdentityProvider
    Condition: IsSocialLoginEnabled
    Properties:
      UserPoolId: !Ref UserPool
      ProviderName: Facebook
      ProviderType: Facebook
      ProviderDetails:
        client_id: !Ref FacebookAppId
        client_secret: !Ref FacebookAppSecret
        authorize_scopes: "email public_profile"
        api_version: "v18.0"
      AttributeMapping:
        email: email
        name: name

  # ---------------------------------------------------------------------------
  # App Client — Member Portal + Admin Portal
  # ---------------------------------------------------------------------------
  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      ClientName: !Sub "osc-portal-client-${Environment}"
      UserPoolId: !Ref UserPool

      # Public client — no client secret. The Next.js frontend (Amplify Auth)
      # uses PKCE with the authorization code flow; no secret is needed.
      GenerateSecret: false

      # Use !Ref on the provider resources (not string literals) so that
      # CloudFormation creates an implicit dependency and does not race when
      # SocialLoginEnabled is true. !Ref on a UserPoolIdentityProvider returns
      # its ProviderName ("Google", "Facebook"). When SocialLoginEnabled is
      # false the providers are excluded by condition, so no dependency exists.
      SupportedIdentityProviders: !If
        - IsSocialLoginEnabled
        - - COGNITO
          - !Ref GoogleIdentityProvider
          - !Ref FacebookIdentityProvider
        - - COGNITO   # email/password only until social login is enabled

      AllowedOAuthFlows:
        - code  # authorization code + PKCE only; implicit flow is not enabled

      AllowedOAuthFlowsUserPoolClient: true

      AllowedOAuthScopes:
        - email
        - openid
        - profile

      CallbackURLs: !Ref CallbackUrl

      LogoutURLs: !Ref LogoutUrl

      ExplicitAuthFlows:
        - ALLOW_REFRESH_TOKEN_AUTH

      # Prevents sign-in error messages from revealing whether an email is
      # registered, consistent with the UserPool advanced security setting.
      PreventUserExistenceErrors: ENABLED

      # Short-lived access and ID tokens reduce the blast radius of a leaked
      # token. Refresh tokens are valid for 30 days to match typical web-app UX.
      AccessTokenValidity: 60
      IdTokenValidity: 60
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: minutes
        IdToken: minutes
        RefreshToken: days

  # ---------------------------------------------------------------------------
  # Hosted UI Domain
  # ---------------------------------------------------------------------------
  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      # The operator must supply a globally unique prefix. See parameter docs.
      Domain: !Ref UserPoolDomainPrefix
      UserPoolId: !Ref UserPool

Outputs:
  UserPoolId:
    Description: Cognito User Pool ID.
    Value: !Ref UserPool
    Export:
      Name: !Sub "osc-cognito-user-pool-id-${Environment}"

  UserPoolArn:
    Description: Cognito User Pool ARN (used by API Gateway Cognito Authorizer).
    Value: !GetAtt UserPool.Arn
    Export:
      Name: !Sub "osc-cognito-user-pool-arn-${Environment}"

  UserPoolClientId:
    Description: App client ID for the Member Portal and Admin Portal.
    Value: !Ref UserPoolClient
    Export:
      Name: !Sub "osc-cognito-user-pool-client-id-${Environment}"

  UserPoolDomainUrl:
    Description: Base URL of the Cognito hosted UI (used for OAuth redirects).
    Value: !Sub "https://${UserPoolDomainPrefix}.auth.${AWS::Region}.amazoncognito.com"
    Export:
      Name: !Sub "osc-cognito-domain-url-${Environment}"
