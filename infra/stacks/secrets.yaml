AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  Secrets Manager secrets for Outdoor Sports Club.
  Provisions the Aurora master-credential secret and the device-token HMAC
  salt. The Stripe key secret is intentionally omitted here — see ODQ 29
  in the design doc for the rationale; it will be added under separate cover.
  All secrets are encrypted with the Aurora KMS CMK imported from kms.yaml.

Parameters:
  Environment:
    Type: String
    AllowedValues: [dev, prod]
    Description: Deployment environment (dev or prod).

  DeviceTokenSalt:
    Type: String
    NoEcho: true
    Description: >-
      256-bit hex string used as the HMAC salt for device-token generation.
      Must be provided at deploy time — the stack will not create or update
      successfully without a real value (min 64 hex chars).
    MinLength: 64
    AllowedPattern: "[0-9a-fA-F]+"
    ConstraintDescription: Must be a hexadecimal string of at least 64 characters.

Resources:

  # ---------------------------------------------------------------------------
  # Aurora master-credential secret (orphaned — kept for history)
  # ---------------------------------------------------------------------------
  # This secret was originally intended to seed the Aurora master password via
  # MasterUserPassword. aurora.yaml now uses ManageMasterUserPassword: true
  # instead, so Aurora owns its own secret and rotates it automatically.
  # This resource is retained to avoid a CloudFormation removal conflict with
  # the osc-aurora-master-secret-arn-<env> export (still used by no stack but
  # cannot be removed while the export exists). Clean up in a follow-up PR:
  # delete this resource + output once all dependent stacks have been updated.
  AuroraMasterSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub "osc/${Environment}/aurora-master"
      Description: !Sub "Aurora master credentials for osc-aurora-${Environment}"
      KmsKeyId: !ImportValue
        Fn::Sub: "osc-kms-aurora-arn-${Environment}"
      GenerateSecretString:
        SecretStringTemplate: '{"username": "oscadmin"}'
        GenerateStringKey: password
        PasswordLength: 32
        ExcludeCharacters: '"@/\'
      Tags:
        - Key: Project
          Value: outdoor-sports-club
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: cloudformation

  # ---------------------------------------------------------------------------
  # Device-token HMAC salt
  # ---------------------------------------------------------------------------
  # Used by the kiosk-pair Lambda to generate and verify device tokens.
  # Supply the salt value via the DeviceTokenSalt parameter at deploy time:
  #   aws cloudformation deploy \
  #     --stack-name osc-secrets-<env> \
  #     --template-file infra/stacks/secrets.yaml \
  #     --parameter-overrides Environment=<env> DeviceTokenSalt=<256-bit-hex> \
  #     --profile outdoorsportsclub
  # Encrypted with the Aurora KMS key (no dedicated key for this secret —
  # the Aurora CMK already grants Secrets Manager service principal access).
  DeviceTokenSaltSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub "osc/${Environment}/device-token-salt"
      Description: !Sub "Device-token HMAC salt for osc kiosk pairing — ${Environment}"
      KmsKeyId: !ImportValue
        Fn::Sub: "osc-kms-aurora-arn-${Environment}"
      SecretString: !Sub '{"salt":"${DeviceTokenSalt}"}'
      Tags:
        - Key: Project
          Value: outdoor-sports-club
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: cloudformation

Outputs:

  AuroraMasterSecretArn:
    Description: ARN of the Aurora master-credential secret.
    Value: !Ref AuroraMasterSecret
    Export:
      Name: !Sub "osc-aurora-master-secret-arn-${Environment}"

  DeviceTokenSaltArn:
    Description: ARN of the device-token HMAC salt secret.
    Value: !Ref DeviceTokenSaltSecret
    Export:
      Name: !Sub "osc-device-token-salt-arn-${Environment}"
