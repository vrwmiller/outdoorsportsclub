            Fn::Sub: "osc-aurora-cluster-arn-${Environment}"
          DB_SECRET_ARN: !ImportValue
            Fn::Sub: "osc-aurora-managed-secret-arn-${Environment}"
          DB_NAME: osc
          DEVICE_TOKEN_SALT_ARN: !ImportValue
            Fn::Sub: "osc-device-token-salt-arn-${Environment}"
          CORS_ALLOW_ORIGIN: !Ref CorsAllowOrigin
          # STRIPE_SECRET_ARN intentionally omitted — Stripe blocked per ODQ #29.
          # Add this variable when the Webmaster lifts the hold.
          STRIPE_SECRET_ARN: ""
      Tags:
        - Key: Project
          Value: outdoor-sports-club
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: cloudformation

