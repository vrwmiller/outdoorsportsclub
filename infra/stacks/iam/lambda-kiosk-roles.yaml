                  - {}
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !ImportValue
                    Fn::Sub: "osc-aurora-managed-secret-arn-${Environment}"
                  - !ImportValue
                    Fn::Sub: "osc-device-token-salt-arn-${Environment}"
              - Effect: Allow
                Action:
                  - kms:Decrypt
                Resource: !ImportValue
                  Fn::Sub: "osc-kms-aurora-arn-${Environment}"
              # ODQ #29: Stripe secret permission added when StripeEnabled.
              - !If
                - StripeEnabled
