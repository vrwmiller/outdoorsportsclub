  # ---------------------------------------------------------------------------
  # osc-admin-members-reset-auth — PATCH /v1/admin/members/reset-auth  (Level 6)
  # Clears social_provider_id in Cognito for the specified member.
  # ---------------------------------------------------------------------------
  AdminMembersResetAuthRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "osc-lambda-admin-members-reset-auth-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: AdminMembersResetAuthPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - rds-data:ExecuteStatement
                  - rds-data:BeginTransaction
                  - rds-data:CommitTransaction
                  - rds-data:RollbackTransaction
                Resource: !Sub
                  - "arn:aws:rds:${AWS::Region}:${AWS::AccountId}:cluster:osc-aurora-${Environment}"
                  - {}
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !ImportValue
                  Fn::Sub: "osc-aurora-managed-secret-arn-${Environment}"
              - Effect: Allow
                Action:
                  - kms:Decrypt
                Resource: !ImportValue
                  Fn::Sub: "osc-kms-aurora-arn-${Environment}"
              # Minimum Cognito IdP actions to clear a member's social link.
              # AdminUpdateUserAttributes sets or clears custom attributes;
              # AdminDeleteUserAttributes removes them entirely.
              - Effect: Allow
                Action:
                  - cognito-idp:AdminUpdateUserAttributes
                  - cognito-idp:AdminDeleteUserAttributes
                Resource: !ImportValue
                  Fn::Sub: "osc-cognito-user-pool-arn-${Environment}"
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*"
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/osc-admin-members-reset-auth-${Environment}:*"
      Tags:
        - Key: Project
          Value: outdoor-sports-club
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: cloudformation

