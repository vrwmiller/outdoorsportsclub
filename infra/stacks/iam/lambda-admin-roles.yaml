AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  IAM execution roles for the eleven Outdoor Sports Club admin Lambda
  functions. Each role is least-privilege: only the data-plane actions
  that function actually invokes are granted. Roles that manage RSO
  overrides or range closures also receive sns:Publish on the admin alerts
  topic. The reset-auth role receives the minimum Cognito IdP actions
  required to clear a member's social provider link.

Parameters:

  Environment:
    Type: String
    AllowedValues: [dev, prod]
    Description: Deployment environment (dev or prod).

Resources:

  # ---------------------------------------------------------------------------
  # osc-admin-ranges-occupancy — GET /v1/admin/ranges/occupancy  (Level 4+)
  # ---------------------------------------------------------------------------
  AdminRangesOccupancyRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "osc-lambda-admin-ranges-occupancy-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: AdminRangesOccupancyPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - rds-data:ExecuteStatement
                  - rds-data:BeginTransaction
                  - rds-data:CommitTransaction
                  - rds-data:RollbackTransaction
                Resource: !Sub
                  - "arn:aws:rds:${AWS::Region}:${AWS::AccountId}:cluster:osc-aurora-${Environment}"
                  - {}
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !ImportValue
                  Fn::Sub: "osc-aurora-managed-secret-arn-${Environment}"
              - Effect: Allow
                Action:
                  - kms:Decrypt
                Resource: !ImportValue
                  Fn::Sub: "osc-kms-aurora-arn-${Environment}"
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*"
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/osc-admin-ranges-occupancy-${Environment}:*"
      Tags:
        - Key: Project
          Value: outdoor-sports-club
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: cloudformation

